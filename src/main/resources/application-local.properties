spring.datasource.url=jdbc:mysql://${QUADRAS_DB_HOST:localhost}:${QUADRAS_DB_PORT:3306}/${QUADRAS_DB_NAME:quadras}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${QUADRAS_DB_USER:quadras}
spring.datasource.password=${QUADRAS_DB_PASSWORD:quadras}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
