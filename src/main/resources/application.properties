spring.application.name=costanorte
spring.profiles.default=local

server.port=${COSTANORTE_SERVER_PORT:${QUADRAS_SERVER_PORT:8080}}

spring.datasource.url=jdbc:mysql://${COSTANORTE_DB_HOST:${QUADRAS_DB_HOST:localhost}}:${COSTANORTE_DB_PORT:${QUADRAS_DB_PORT:3306}}/${COSTANORTE_DB_NAME:${QUADRAS_DB_NAME:db_quadras}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
spring.datasource.username=${COSTANORTE_DB_USER:${QUADRAS_DB_USER:root}}
spring.datasource.password=${COSTANORTE_DB_PASSWORD:${QUADRAS_DB_PASSWORD:sasa}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

costanorte.security.jwt.issuer=${COSTANORTE_JWT_ISSUER:costanorte-backend}
costanorte.security.jwt.secret=${COSTANORTE_JWT_SECRET:costanorte-local-jwt-secret-change-me-2026}
costanorte.security.jwt.expiration-seconds=${COSTANORTE_JWT_EXPIRATION_SECONDS:28800}
costanorte.security.demo-user.enabled=${COSTANORTE_DEMO_USER_ENABLED:true}
costanorte.security.demo-user.username=${COSTANORTE_DEMO_USER_USERNAME:operador.demo}
costanorte.security.demo-user.password=${COSTANORTE_DEMO_USER_PASSWORD:123456}
costanorte.security.demo-user.role=${COSTANORTE_DEMO_USER_ROLE:OPERATOR}
costanorte.features.maintenance-simulation.enabled=${COSTANORTE_FEATURE_MAINTENANCE_SIMULATION_ENABLED:true}
